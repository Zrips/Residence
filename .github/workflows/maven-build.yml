name: Maven Build

on:
  push:
  pull_request:
  workflow_dispatch:

permissions:
  contents: read

concurrency:
  group: maven-build-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  build:
    name: Build with Java 25
    runs-on: ubuntu-latest

    steps:
      - name: Check out repository
        uses: actions/checkout@v5

      - name: Set up Java 25
        uses: actions/setup-java@v5
        with:
          distribution: temurin
          java-version: '25'
          cache: maven
          cache-dependency-path: pom.xml

      - name: Build with Maven
        run: mvn --batch-mode --no-transfer-progress --update-snapshots clean verify

      - name: Show build output
        run: ls -lh target/Residence*.jar

      - name: Upload Residence jar
        uses: actions/upload-artifact@v6
        with:
          name: Residence-${{ github.run_number }}-${{ github.sha }}
          path: target/Residence*.jar
          if-no-files-found: error
          retention-days: 30